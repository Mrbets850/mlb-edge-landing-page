<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="1; url=https://mrbets850.streamlit.app/" />
    <title>Launching MLB Edge</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <style>
      :root {
        --bg: #12031f;
        --card: #1b0b2d;
        --line: #3a1f55;
        --ink: #fff7df;
        --muted: #d8c7ee;
        --dim: #9279ad;
        --gold: #ffd000;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(700px 420px at 70% 0%, rgba(255, 208, 0, 0.16), transparent 60%),
          radial-gradient(700px 420px at 15% 20%, rgba(155, 45, 255, 0.18), transparent 60%),
          var(--bg);
      }
      main {
        width: min(520px, 100%);
        text-align: center;
        background: rgba(27, 11, 45, 0.86);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 34px 24px;
        box-shadow: 0 30px 90px -30px rgba(0, 0, 0, 0.8);
      }
      img {
        width: 76px;
        height: 76px;
        border-radius: 18px;
        object-fit: cover;
        box-shadow: 0 0 0 1px rgba(255, 208, 0, 0.36), 0 16px 34px -18px rgba(255, 208, 0, 0.75);
      }
      h1 {
        margin: 22px 0 10px;
        font-size: clamp(28px, 7vw, 42px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      p {
        margin: 0 auto 22px;
        max-width: 420px;
        color: var(--muted);
        line-height: 1.55;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 12px 18px;
        border-radius: 12px;
        background: linear-gradient(180deg, #ffb300 0%, var(--gold) 100%);
        color: #1b0b2d;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 10px 30px -12px rgba(255, 208, 0, 0.65);
      }
      .url {
        display: block;
        margin-top: 18px;
        color: var(--dim);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./assets/mlb-edge-logo.webp" alt="" width="76" height="76" />
      <h1>Launching MLB Edge</h1>
      <p>If the app does not open automatically, tap the button below.</p>
      <a class="button" href="https://mrbets850.streamlit.app/" rel="noopener noreferrer">Open MLB Edge App</a>
      <span class="url">https://mrbets850.streamlit.app/</span>
    </main>
    <script>
      window.setTimeout(function () {
        window.location.href = "https://mrbets850.streamlit.app/";
      }, 350);
    </script>
  </body>
</html>
