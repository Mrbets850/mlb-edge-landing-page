<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12031f"/>
      <stop offset="100%" stop-color="#1b0b2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ffd000" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#9b2dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad-text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8b8"/>
      <stop offset="70%" stop-color="#ffd000"/>
      <stop offset="100%" stop-color="#9b2dff"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80,80)">
    <rect width="72" height="72" rx="16" fill="#1b0b2d" stroke="#3a1f55" stroke-width="2"/>
    <path d="M20 18h32v9H29v9h20v9H29v9h24v9H20z" fill="#ffd000"/>
    <path d="M54 54 L70 28" stroke="#9b2dff" stroke-width="5" stroke-linecap="round"/>
    <path d="M64 30 L76 20 L72 36" fill="#ffd000"/>
  </g>
  <text x="172" y="132" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#fff7df" letter-spacing="-0.5">MLB Edge</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="76" font-weight="800" fill="#fff7df" letter-spacing="-2">The analyst's edge for</text>
  <text x="80" y="408" font-family="Inter, sans-serif" font-size="76" font-weight="800" fill="url(#grad-text)" letter-spacing="-2">every MLB matchup.</text>

  <!-- Sub -->
  <text x="80" y="476" font-family="Inter, sans-serif" font-size="26" font-weight="400" fill="#d8c7ee">Pitcher form · batter splits · park factors · weather — all in one view.</text>

  <!-- Pill -->
  <g transform="translate(80,530)">
    <rect width="220" height="44" rx="22" fill="#ffd000"/>
    <text x="110" y="29" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#1b0b2d">Launch MLB Edge →</text>
  </g>
  <text x="320" y="558" font-family="Inter, sans-serif" font-size="14" fill="#9279ad">Independent analytics — not affiliated with MLB or any sportsbook.</text>

  <!-- Decorative mini chart -->
  <g transform="translate(820,360)" opacity="0.9">
    <rect x="0" y="0" width="300" height="160" rx="14" fill="#1b0b2d" stroke="#3a1f55"/>
    <text x="16" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#9279ad">MODEL EDGE · L14</text>
    <path d="M16 130 L48 122 L80 124 L112 104 L144 110 L176 86 L208 92 L240 70 L272 78 L284 60" fill="none" stroke="#ffd000" stroke-width="2.5"/>
    <text x="16" y="150" font-family="JetBrains Mono, monospace" font-size="11" fill="#d8c7ee">+3.2σ</text>
  </g>
</svg>
